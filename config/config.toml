# Live-Vision-Narrator - 設定ファイル
# 環境変数が優先されます（例: OLLAMA_URL, STT_ENDPOINT など）。

# --- Ollama (生成) ---
ollama_url = "http://localhost:11434"
ollama_generate_path = "/api/generate"
ollama_models_path = "/api/tags"
default_think = false
default_model = "live-narrator"

# --- ログ / セッション管理 ---
log_level = "INFO"         # DEBUG, INFO, WARNING, ERROR
model_idle_seconds = 2000   # モデルがアイドルとみなされる秒数
max_context_tokens = 0

# --- Discord / STT ---
# 空文字は未設定。環境変数での上書きを推奨します。
discord_guild_id = ""
discord_text_channel_id = ""
discord_voice_channel_id = ""
silence_ms = 800
chunk_ms = 200
max_segment_ms = 15000
min_post_chars = 1
post_cooldown_ms = 1000

# STT エンドポイント（例: http://localhost:8001/stt/ingest）
stt_endpoint = ""
# STT API キーを取得する環境変数名（実際のキーは環境変数に設定する）
stt_api_key_env_name = "STT_API_KEY"
# true にすると部分送信せず、最終時に一括で変換結果を送信します
stt_use_single_final = true  # 部分送信を無効にする(DEBUG)

# --- システムプロンプト / ファイルパス ---
system_default_file = "Modelfile"
system_detailed_file = "Modelfile.detailed"

# --- サーバ / UI ---
host_ip = "0.0.0.0"
ui_ip = "0.0.0.0"
api_host = "localhost"
api_port = 8000
ui_port = 8001
