# Live-Vision-Narrator Configuration
#
# Copy this file to `config.toml` and adjust values as needed.
# Settings are loaded with the following precedence (highest to lowest):
#   1. Environment variables (e.g., OLLAMA_URL=...)
#   2. .env file
#   3. config.toml file (this file, renamed without .example)
#   4. Hardcoded defaults in config.py

# Ollama server connection settings
ollama_url = "http://localhost:11434"
ollama_generate_path = "/api/generate"
ollama_models_path = "/api/tags"

# Whether to enable 'think' (internal reasoning/CoT) by default
# Override per-request via parameters.think in API calls
default_think = false

# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = "DEBUG"

# Session management: seconds of idle time before a model is considered unloaded
# Used to detect "first_loading" status in responses
# Note: Ollama typically keeps models in memory for several minutes. Set this higher
# to avoid false positives in development (e.g., 4000 miliseconds = 4 seconds).
model_idle_seconds = 4000

# System prompt profile file paths (supports local Modelfiles)
system_default_file = "Modelfile"
system_detailed_file = "Modelfile.detailed"

# Server ports / ip
# host_ip: server binding address for API (127.0.0.1 for localhost only, 0.0.0.0 for all interfaces)
# RECOMMENDED: Keep as "127.0.0.1" - external access goes through UI server (reverse proxy)
host_ip = "127.0.0.1"
ui_ip = "0.0.0.0"
# api_host: hostname the browser uses to connect to API (reverse proxied via UI server)
# For local testing: "localhost" (UI server proxies to api_local_host internally)
# For external testing (UI running on different machine): "localhost" (UI still proxies internally)
# Examples:
#   api_host = "localhost"          # Default (UI proxies to local API)
#   api_host = "127.0.0.1"          # Same as localhost
#   api_host = "api.example.com"    # Custom domain
# Can also be set via API_HOST environment variable (takes precedence)
api_host = "localhost"

# api_local_host: local address for UI server to connect to backend API
# This is used internally by the UI server to proxy /api/* requests
# The browser connects to the UI server, not directly to this address
# Examples:
#   api_local_host = "127.0.0.1"    # Localhost (default)
#   api_local_host = "localhost"    # Same as 127.0.0.1
#   api_local_host = "api"          # Docker networking
# Can also be set via API_LOCAL_HOST environment variable (takes precedence)
api_local_host = "127.0.0.1"

# cors_origins: CORS allowed origins (comma-separated list)
# For development/testing: "*" (allow all origins)
# For production: "http://localhost:8001,http://127.0.0.1:8001" or specific URLs
# Can also be set via CORS_ORIGINS environment variable (takes precedence)
cors_origins = "http://localhost:8001,http://127.0.0.1:8001"

api_port = 8000
ui_port = 8001
