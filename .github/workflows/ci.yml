name: CI

on: [push, pull_request]

jobs:
  runner:
    name: ${{ matrix.language }} ${{ matrix.task == 'lint' && 'LintCheck' || matrix.task == 'fmt' && 'FmtCheck' || matrix.task == 'build' && 'BuildCheck' || 'Test' }} (${{ matrix.os == 'windows-latest' && 'Windows' || 'Ubuntu' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        language: [go, rust]
        os: [ubuntu-latest, windows-latest]
        task: [build, test]
        go-version: ['1.26']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      # Rust キャッシュ（Rust のみ）
      - name: Cache Rust
        if: matrix.language == 'rust'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-rust -> target"
          prefix-key: "v3-rust-${{ runner.os }}"
          cache-targets: true

      - name: Run Task
        shell: bash
        run: |
          if [ "${{ matrix.language }}" == "go" ]; then
            if [ "${{ matrix.task }}" == "build" ]; then
              echo "--- Go Build on ${{ matrix.os }} ---"
              (cd src-go && go build ./...)
            else
              echo "--- Go Test on ${{ matrix.os }} ---"
              (cd src-go && go test ./...)
            fi
          else
            if [ "${{ matrix.task }}" == "build" ]; then
              echo "--- Rust Build on ${{ matrix.os }} ---"
              cargo build --manifest-path src-rust/Cargo.toml
            else
              echo "--- Rust Test on ${{ matrix.os }} ---"
              cargo test --manifest-path src-rust/Cargo.toml
            fi
          fi

  lint-fmt:
    name: ${{ matrix.language }} ${{ matrix.task == 'lint' && 'LintCheck' || matrix.task == 'fmt' && 'FmtCheck' }} (Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, rust]
        task: [lint]
        go-version: ['1.26']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Use workspace-local GOPATH and GOMODCACHE
        if: matrix.language == 'go'
        shell: bash
        run: |
          echo "Setting workspace-local GOPATH and GOMODCACHE"
          export LOCAL_GOPATH="${GITHUB_WORKSPACE}/.gopath"
          export LOCAL_GOMODCACHE="${GITHUB_WORKSPACE}/.gomodcache"
          mkdir -p "$LOCAL_GOPATH" "$LOCAL_GOMODCACHE" "$HOME/.cache/go-build"
          echo "GOPATH=$LOCAL_GOPATH" >> $GITHUB_ENV
          echo "GOMODCACHE=$LOCAL_GOMODCACHE" >> $GITHUB_ENV
          echo "GOBIN=$LOCAL_GOPATH/bin" >> $GITHUB_ENV

      - name: Cache Go build and module cache (workspace-local)
        if: matrix.language == 'go'
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.gomodcache
            ~/.cache/go-build
          key: go-cache-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-cache-${{ runner.os }}-

      - name: Download Go modules
        if: matrix.language == 'go'
        shell: bash
        run: |
          echo "Downloading Go modules for src-go"
          cd src-go
          # show go env for debugging
          go env
          go mod download

      # Formatting is handled by golangci-lint in lint step; no separate fmt tool install

      - name: Restore golangci-lint binary cache
        if: matrix.language == 'go' && matrix.task == 'lint'
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.gobin
            $HOME/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-v1.64.8-go-${{ matrix.go-version }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-

      - name: Install golangci-lint via go install
        if: matrix.language == 'go' && matrix.task == 'lint'
        shell: bash
        env:
          GOPATH: ${{ env.GOPATH }}
          GOMODCACHE: ${{ env.GOMODCACHE }}
        run: |
          # install into workspace-local GOBIN
          GOBIN="${GITHUB_WORKSPACE}/.gopath/bin"
          mkdir -p "$GOBIN"
          if [ ! -x "$GOBIN/golangci-lint" ]; then
            GOBIN="$GOBIN" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          fi
          echo "${GITHUB_WORKSPACE}/.gopath/bin" >> $GITHUB_PATH

      - name: Copy golangci-lint into workspace .gobin for caching
        if: matrix.language == 'go' && matrix.task == 'lint'
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.gobin"
          cp -f "${GITHUB_WORKSPACE}/.gopath/bin/golangci-lint" "$GITHUB_WORKSPACE/.gobin/" || true

      - name: Run golangci-lint
        if: matrix.language == 'go' && matrix.task == 'lint'
        shell: bash
        run: |
          set -o pipefail
          echo "--- listing src-go files ---"
          find src-go -type f -name '*.go' -print
          echo "--- Run golangci-lint (with config) ---"
          # fail the job on any linter issues
          golangci-lint run --config .golangci.yml ./src-go/...

      - name: Save golangci-lint binary cache
        if: matrix.language == 'go' && matrix.task == 'lint'
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.gobin
          key: golangci-lint-${{ runner.os }}-v1.64.8-go-${{ matrix.go-version }}



      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        if: matrix.language == 'rust'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-rust -> target"
          prefix-key: "v3-rust-${{ runner.os }}"
          cache-targets: true

      - name: Run cargo clippy
        if: matrix.language == 'rust' && matrix.task == 'lint'
        shell: bash
        run: |
          cargo clippy --manifest-path src-rust/Cargo.toml -- -D warnings

      # Rust formatting check omitted; clippy lint covers code quality
