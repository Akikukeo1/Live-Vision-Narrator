name: CI

on: [push, pull_request]

jobs:
  runner:
    name: ${{ matrix.language }} ${{ matrix.task == 'lint' && 'LintCheck' || matrix.task == 'fmt' && 'FmtCheck' || matrix.task == 'build' && 'BuildCheck' || 'Test' }} (${{ matrix.os == 'windows-latest' && 'Win' || 'Ubuntu' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        language: [go, rust]
        os: [ubuntu-latest, windows-latest]
        task: [build, test]
        go-version: ['1.26']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      # Rust キャッシュ（Rust のみ）
      - name: Cache Rust
        if: matrix.language == 'rust'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-rust -> target"
          prefix-key: "v3-rust-${{ runner.os }}"
          cache-targets: true

      - name: Run Task
        shell: bash
        run: |
          if [ "${{ matrix.language }}" == "go" ]; then
            if [ "${{ matrix.task }}" == "build" ]; then
              echo "--- Go Build on ${{ matrix.os }} ---"
              (cd src-go && go build ./...)
            else
              echo "--- Go Test on ${{ matrix.os }} ---"
              (cd src-go && go test ./...)
            fi
          else
            if [ "${{ matrix.task }}" == "build" ]; then
              echo "--- Rust Build on ${{ matrix.os }} ---"
              cargo build --manifest-path src-rust/Cargo.toml
            else
              echo "--- Rust Test on ${{ matrix.os }} ---"
              cargo test --manifest-path src-rust/Cargo.toml
            fi
          fi

  lint-fmt:
    name: ${{ matrix.language }} ${{ matrix.task == 'lint' && 'LintCheck' || matrix.task == 'fmt' && 'FmtCheck' }} (Ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, rust]
        task: [lint, fmt]
        go-version: ['1.26']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Cache Go build and module cache
        if: matrix.language == 'go'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-cache-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-cache-${{ runner.os }}-

      - name: Install Go lint/format tools
        if: matrix.language == 'go'
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install mvdan.cc/gofumpt@latest

      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        if: matrix.language == 'rust'
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-rust -> target"
          prefix-key: "v3-rust-${{ runner.os }}"
          cache-targets: true

      - name: Run Lint/Format Check
        shell: bash
        run: |
          if [ "${{ matrix.language }}" == "go" ]; then
            if [ "${{ matrix.task }}" == "lint" ]; then
              echo "--- Lint check (Go) ---"
              golangci-lint run --config .golangci.yml ./src-go/...
            else
              echo "--- Format check (Go) ---"
              gofumpt -l -e src-go
            fi
          else
            if [ "${{ matrix.task }}" == "lint" ]; then
              echo "--- Lint check (Rust) ---"
              cargo clippy --manifest-path src-rust/Cargo.toml -- -D warnings
            else
              echo "--- Format check (Rust) ---"
              cargo fmt --manifest-path src-rust/Cargo.toml -- --check
            fi
          fi
