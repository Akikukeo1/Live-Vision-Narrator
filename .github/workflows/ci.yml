name: CI

on: [push, pull_request]

jobs:
  runner:
    name: ${{ matrix.task }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        task: [build, test]
        go-version: ['1.22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # tar エラー (exit code 2) 対策
      # prefix-key を更新（v2 -> v3）することで、壊れた可能性のある古いキャッシュを強制破棄します
      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-rust -> target"
          # キーを更新してキャッシュをクリーンアップ
          prefix-key: "v3-rust-${{ runner.os }}"
          # Ubuntu での展開エラーを避けるため、一旦キャッシュ対象を絞る
          cache-targets: true

      - name: Run Task
        shell: bash
        run: |
          if [ "${{ matrix.task }}" == "build" ]; then
            echo "--- Fast Build Mode ---"
            go -C src-go build ./...
            cargo build --manifest-path src-rust/Cargo.toml
          else
            echo "--- Fast Test Mode ---"
            go -C src-go test ./...
            cargo test --manifest-path src-rust/Cargo.toml
          fi

  lint-fmt:
    name: Lint & Format Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, fmt]
        go-version: ['1.22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: false
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-rust -> target"
          prefix-key: "v3-rust-${{ runner.os }}"
          cache-targets: true

      - name: Run Lint/Format Check
        shell: bash
        run: |
          if [ "${{ matrix.task }}" == "lint" ]; then
            echo "--- Lint check (Go + Rust) ---"
            cd src-go && go vet ./...
            cargo clippy --manifest-path src-rust/Cargo.toml -- -D warnings
          else
            echo "--- Format check (Go + Rust) ---"
            # gofmt: list files that would change (non-zero output indicates failures)
            cd src-go && gofmt -l -e . || true
            cargo fmt --manifest-path src-rust/Cargo.toml -- --check
          fi
